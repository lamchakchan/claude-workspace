version: 2

builds:
  - id: claude-workspace
    binary: claude-workspace
    main: .
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: lamchakchan
    name: claude-workspace
  prerelease: auto

brews:
  - repository:
      owner: lamchakchan
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/lamchakchan/claude-workspace
    description: "Platform engineering kit for deploying Claude Code AI agents"
    license: "Apache-2.0"
    install: |
      bin.install "claude-workspace"
    test: |
      system "#{bin}/claude-workspace", "version"

nfpms:
  - id: default
    package_name: claude-workspace
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - deb
      - rpm
    vendor: "Lam Chan"
    homepage: "https://github.com/lamchakchan/claude-workspace"
    maintainer: "Lam Chan <lamchakchan@gmail.com>"
    description: "Platform engineering kit for deploying Claude Code AI agents"
    license: "Apache-2.0"
    section: "devel"
    priority: "optional"
    bindir: /usr/bin
    dependencies:
      - git
    contents:
      - src: LICENSE
        dst: /usr/share/doc/claude-workspace/LICENSE
        file_info:
          mode: 0644
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
